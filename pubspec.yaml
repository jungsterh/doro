name: doro
description: "Doro — a focused time-tracking app with glass UI aesthetics."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  fl_chart: ^0.69.0
  supabase_flutter: ^2.14.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^10.0.0
  csv: ^6.0.0
  in_app_purchase: ^3.2.0
  firebase_core: ^3.6.0
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  flutter_dotenv: ^5.1.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/doro_icon.png
    - assets/sounds/
    - .env
