name: doro
description: "Doro — a focused time-tracking app with glass UI aesthetics."
publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  fl_chart: ^0.69.0
  supabase_flutter: ^2.14.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^10.0.0
  csv: ^6.0.0
  in_app_purchase: ^3.2.0
  firebase_core: ^4.11.0
  crypto: ^3.0.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^6.1.0
  flutter_dotenv: ^5.1.0
  audioplayers: ^6.1.0
  wakelock_plus: ^1.4.0
  screen_brightness: ^2.1.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4

# App icon generation. Master icon: 1024x1024, no alpha (iOS store requirement).
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  # Master icon: 1024x1024 (or larger), no alpha. Used for iOS + Android legacy.
  image_path: "assets/icon/doro_icon_1024.png"
  # Android adaptive icon: black background (matches the art) so there is no
  # white ring, with the wordmark pre-scaled to fill the circle's safe zone.
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/doro_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/doro_icon.png
    - assets/sounds/
    - .env
